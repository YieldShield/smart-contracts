name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Foundry and package checks
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
        with:
          version: v1.5.1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Check Solidity formatting
        run: forge fmt --check

      - name: Check JavaScript formatting
        run: npx prettier --check "scripts-js/**/*.{js,cjs}"

      - name: Run JavaScript unit tests
        run: npm run test:scripts

      - name: Check Foundry dependency lock
        run: npm run check:foundry-lock

      - name: Assert via_ir is enabled in [profile.default]
        run: |
          python3 - <<'PY'
          import sys, tomllib
          with open("foundry.toml", "rb") as fh:
              cfg = tomllib.load(fh)
          default = cfg.get("profile", {}).get("default", {})
          if default.get("via_ir") is not True:
              print(
                  "::error file=foundry.toml::"
                  "[profile.default].via_ir must be true (codegen regression risk)"
              )
              sys.exit(1)
          PY

      - name: Build contracts
        run: forge build

      - name: Check storage layout snapshots (I-2)
        run: bash scripts-js/check-storage-layout.sh

      - name: Run tests
        run: forge test

      - name: Run strict path-effective invariant profile
        env:
          FOUNDRY_PROFILE: invariant-strict
        run: forge test --match-contract SplitRiskPoolInvariantTest

      - name: Check high-severity npm advisories
        run: npm audit --omit=dev --audit-level=high

  fork-tests:
    name: Fork tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
        with:
          version: v1.5.1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Detect fork RPC secrets
        id: fork-rpc
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
        run: |
          if [ -n "$MAINNET_RPC_URL" ] && [ -n "$SEPOLIA_RPC_URL" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::MAINNET_RPC_URL and SEPOLIA_RPC_URL secrets are not both configured; skipping live fork tests"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run fork tests
        if: steps.fork-rpc.outputs.available == 'true'
        env:
          FORK_TESTS_REQUIRED: "true"
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
        run: forge test --match-path "test/*Fork.t.sol"

  contract-size:
    name: Contract size report
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
        with:
          version: v1.5.1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Check contract size limits
        env:
          CONTRACT_SIZE_REPORT_ONLY: "true"
        run: npm run size-check

  coverage:
    name: Foundry coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
        with:
          version: v1.5.1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Generate coverage summary
        # Coverage instrumentation invalidates gas benchmarks. The normal Foundry
        # job still runs this suite without instrumentation and enforces its 15M cap.
        run: forge coverage --ffi --ir-minimum --report summary --no-match-path "test/FactoryLinearScanGas.t.sol"

  slither:
    name: Slither security analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # I-3: keep continue-on-error so the artifact/SARIF upload still runs
    # when slither itself errors out, but the dedicated "gate on
    # high-severity findings" step below is NOT in continue-on-error and
    # blocks the PR when slither flags a new high.
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
        with:
          version: v1.5.1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Slither
        run: |
          python -m pip install --upgrade pip
          python -m pip install slither-analyzer==0.11.5

      - name: Build contracts
        run: forge build

      - name: Run Slither SARIF analysis
        run: |
          slither . \
            --foundry-out-directory out \
            --config-file slither.config.json \
            --sarif slither-results.sarif \
            || true

      - name: Run Slither Markdown report
        run: |
          slither . \
            --foundry-out-directory out \
            --config-file slither.config.json \
            --checklist \
            --markdown-root "https://github.com/${{ github.repository }}/blob/${{ github.sha }}/" \
            > slither-report.md 2>&1 || true

      - name: Ensure Slither SARIF exists
        run: |
          if [ ! -s slither-results.sarif ]; then
            printf '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Slither","informationUri":"https://github.com/crytic/slither","rules":[]}},"results":[]}]}\n' > slither-results.sarif
          fi

      - name: Upload Slither SARIF
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: slither-results.sarif
          category: slither

      - name: Upload Slither reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: slither-report
          path: |
            slither-report.md
            slither-results.sarif
          if-no-files-found: warn
          retention-days: 30

  # Codex P2 follow-up: the high-severity gate lives in its own job (no
  # continue-on-error) so a non-zero --fail-high exit actually blocks the PR.
  # The reporting job above is allowed to fail so transient slither tooling
  # errors don't take down CI while still uploading the SARIF / markdown
  # report; this job runs slither again strictly for the gate.
  slither-gate:
    name: Slither high-severity gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: slither

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
        with:
          version: v1.5.1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Slither
        run: |
          python -m pip install --upgrade pip
          python -m pip install slither-analyzer==0.11.5

      - name: Build contracts
        run: forge build

      - name: Fail on Slither high-severity findings
        run: |
          slither . \
            --foundry-out-directory out \
            --config-file slither.config.json \
            --fail-high

  aderyn:
    name: Aderyn security report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Aderyn is report-only today. Slither's dedicated --fail-high job is the
    # blocking static-analysis severity gate; review this artifact manually
    # unless/until Aderyn gets its own stable severity gate.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Aderyn
        run: npm install -g @cyfrin/aderyn@0.6.8

      - name: Run Aderyn report
        run: aderyn . -o aderyn-report.md --no-snippets --skip-update-check

      - name: Upload Aderyn report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: aderyn-report
          path: aderyn-report.md
          if-no-files-found: warn
          retention-days: 30
