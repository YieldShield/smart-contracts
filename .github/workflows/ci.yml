name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Foundry and package checks
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Check Solidity formatting
        run: forge fmt --check

      - name: Check JavaScript formatting
        run: npx prettier --check "scripts-js/**/*.{js,cjs}"

      - name: Build contracts
        run: forge build

      - name: Run tests
        run: forge test

      - name: Check high-severity npm advisories
        run: npm audit --omit=dev --audit-level=high

  contract-size:
    name: Contract size report
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Check contract size limits
        continue-on-error: true
        run: npm run size-check

  coverage:
    name: Foundry coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Generate coverage summary
        run: forge coverage --ffi --ir-minimum --report summary

  slither:
    name: Slither security analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Slither
        run: |
          python -m pip install --upgrade pip
          python -m pip install slither-analyzer==0.10.3

      - name: Build contracts
        run: forge build

      - name: Run Slither SARIF analysis
        run: |
          slither . \
            --foundry-out-directory out \
            --config-file slither.config.json \
            --sarif slither-results.sarif \
            || true

      - name: Run Slither Markdown report
        run: |
          slither . \
            --foundry-out-directory out \
            --config-file slither.config.json \
            --checklist \
            --markdown-root "https://github.com/${{ github.repository }}/blob/${{ github.sha }}/" \
            > slither-report.md 2>&1 || true

      - name: Ensure Slither SARIF exists
        run: |
          if [ ! -s slither-results.sarif ]; then
            printf '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Slither","informationUri":"https://github.com/crytic/slither","rules":[]}},"results":[]}]}\n' > slither-results.sarif
          fi

      - name: Upload Slither SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: slither-results.sarif
          category: slither

      - name: Upload Slither reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slither-report
          path: |
            slither-report.md
            slither-results.sarif
          if-no-files-found: warn
          retention-days: 30

  aderyn:
    name: Aderyn security report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install Aderyn
        run: npm install -g @cyfrin/aderyn@0.5.6

      - name: Run Aderyn report
        run: aderyn . -o aderyn-report.md --no-snippets --skip-update-check

      - name: Upload Aderyn report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aderyn-report
          path: aderyn-report.md
          if-no-files-found: warn
          retention-days: 30
