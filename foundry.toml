[profile.default]
src = 'contracts'
out = 'out'
libs = ['lib', 'node_modules']
solc_version = "0.8.35"
fs_permissions = [
    # Deploy scripts and DeploymentMetadata tests write per-chain JSON here.
    { access = "read-write", path = "./deployments/" },
    # DeployHelpers reads `run-latest.json`; DeploymentMetadata tests write
    # synthetic broadcast records for fixture setup.
    { access = "read-write", path = "./broadcast/" },
    # VerifyAll.s.sol reads compiled bytecode artifacts. Read-only.
    { access = "read", path = "./out/" },
]
optimizer = true
optimizer_runs = 200
via_ir = true
block_number = 1_000_000
block_timestamp = 1_725_000_000
gas_reports = ["SplitRiskPool", "SplitRiskPoolFactory"]
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "solidity-bytes-utils/=lib/solidity-bytes-utils/contracts/"
]


[rpc_endpoints]
default_network = "http://127.0.0.1:8545"

mainnet = "https://eth-mainnet.alchemyapi.io/v2/${ALCHEMY_API_KEY}"
sepolia = "https://eth-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
arbitrum = "https://arb-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
arbitrumSepolia = "https://arb-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
optimism = "https://opt-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
optimismSepolia = "https://opt-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
polygon = "https://polygon-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
polygonMumbai = "https://polygon-mumbai.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
polygonZkEvm = "https://zkevm-rpc.com"
polygonZkEvmTestnet = "https://rpc.public.zkevm-test.net"
gnosis = "https://rpc.gnosischain.com"
chiado = "https://rpc.chiadochain.net"
base = "https://mainnet.base.org"
baseSepolia = "https://base-sepolia.drpc.org"
scrollSepolia = "https://sepolia-rpc.scroll.io"
scroll = "https://rpc.scroll.io"
pgn = "https://rpc.publicgoods.network"
pgnTestnet = "https://sepolia.publicgoods.network"


localhost = "http://127.0.0.1:8545"

[etherscan]
polygonMumbai = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }



[fuzz]
runs = 256
max_test_rejects = 65536

[invariant]
runs = 256           # Number of invariant test runs
depth = 500          # Number of calls per run
fail_on_revert = false  # Don't fail on handler reverts

[fmt]
line_length = 120
tab_width = 4
quote_style = "double"
bracket_spacing = true
int_types = "long"




# See more config options https://book.getfoundry.sh/reference/config/overview
